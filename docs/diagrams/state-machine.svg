<line x1="145" y1="440" x2="145" y2="530" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="150" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#666">all wallet txs resolved</text>
<text x="360" y="452" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888" font-style="italic">(sdk.manualTransfer() for admin release)</text>
