<svg xmlns="http://www.w3.org/2000/svg" width="600" height="660" viewBox="0 0 600 660" xml:space="preserve">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.12"/>
  </filter>
</defs>
<rect width="600" height="660" fill="#f8f9fa"/>
<rect x="150" y="20" width="300" height="52" rx="25" fill="#2C3E50" filter="url(#shadow)"/>
<text x="300" y="46" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Transfer detected</text>
<rect x="150" y="122" width="300" height="62" rx="8" fill="#3498DB" filter="url(#shadow)"/>
<text x="300" y="143" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">pending_confirmations</text>
<text x="300" y="162" text-anchor="middle" dominant-baseline="middle" font-family="ui-monospace, monospace" font-size="11" fill="white" opacity="0.85">waiting for N block confirmations</text>
<rect x="150" y="240" width="300" height="62" rx="8" fill="#9B59B6" filter="url(#shadow)"/>
<text x="300" y="261" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">pending_kyt</text>
<text x="300" y="280" text-anchor="middle" dominant-baseline="middle" font-family="ui-monospace, monospace" font-size="11" fill="white" opacity="0.85">KYT check in progress</text>
<rect x="50" y="378" width="190" height="62" rx="8" fill="#27AE60" filter="url(#shadow)"/>
<text x="145" y="409" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">approved</text>
<rect x="360" y="378" width="190" height="62" rx="8" fill="#E74C3C" filter="url(#shadow)"/>
<text x="455" y="399" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">blocked</text>
<text x="455" y="418" text-anchor="middle" dominant-baseline="middle" font-family="ui-monospace, monospace" font-size="11" fill="white" opacity="0.85">funds held on wallet</text>
<rect x="50" y="530" width="190" height="62" rx="8" fill="#2C3E50" filter="url(#shadow)"/>
