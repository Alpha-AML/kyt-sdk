<text x="305" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#666">detected</text>
<line x1="300" y1="184" x2="300" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="305" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#666">N blocks elapsed</text>
<path d="M 300 302 L 300 330 L 145 330 L 145 378" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="152" y="322" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#666">score ≤ threshold</text>
<path d="M 300 302 L 300 330 L 455 330 L 455 378" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
