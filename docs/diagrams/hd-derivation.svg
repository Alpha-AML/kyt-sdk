<svg xmlns="http://www.w3.org/2000/svg" width="940" height="510" viewBox="0 0 940 510" xml:space="preserve">
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
  </marker>
  <filter id="sh" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.12"/>
  </filter>
</defs>

<!-- Background -->
<rect width="940" height="510" fill="#f8f9fa"/>

<!-- Warning note -->
<rect x="20" y="20" width="230" height="80" rx="6" fill="#F39C12" filter="url(#sh)"/>
<text x="135" y="44" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">&#x26A0;  One master seed</text>
<text x="135" y="63" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white">controls all wallets</text>
<text x="135" y="82" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white">Back up securely</text>

<!-- Master Seed -->
<rect x="275" y="20" width="280" height="80" rx="8" fill="#E74C3C" filter="url(#sh)"/>
<text x="415" y="52" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="white">Master Seed (32 bytes)</text>
<text x="415" y="76" text-anchor="middle" dominant-baseline="middle" font-family="ui-monospace, monospace" font-size="11" fill="white" opacity="0.85">stored in KMS / Vault</text>

<!-- Arrow: Master Seed → BIP32 Root -->
<line x1="415" y1="100" x2="415" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- BIP32 Root Key -->
<rect x="295" y="157" width="240" height="58" rx="8" fill="#2C3E50" filter="url(#sh)"/>
<text x="415" y="186" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">BIP32 Root Key  m/</text>

<!-- Arrows: BIP32 Root → EVM Path and Tron Path -->
<path d="M 360 215 L 360 248 L 195 248 L 195 274" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
<path d="M 470 215 L 470 248 L 740 248 L 740 274" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- EVM Path -->
<rect x="30" y="276" width="330" height="60" rx="8" fill="#3498DB" filter="url(#sh)"/>
<text x="195" y="297" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">EVM  m/44&#x2032;/60&#x2032;/0&#x2032;/0/</text>
<text x="195" y="319" text-anchor="middle" dominant-baseline="middle" font-family="ui-monospace, monospace" font-size="11" fill="white" opacity="0.85">Ethereum &#xB7; Arbitrum &#xB7; Base &#xB7; BSC</text>

<!-- Tron Path -->
<rect x="570" y="276" width="340" height="60" rx="8" fill="#9B59B6" filter="url(#sh)"/>
<text x="740" y="297" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Tron  m/44&#x2032;/195&#x2032;/0&#x2032;/0/</text>
<text x="740" y="319" text-anchor="middle" dominant-baseline="middle" font-family="ui-monospace, monospace" font-size="11" fill="white" opacity="0.85">Tron network</text>

<!-- Arrows: EVM Path → index boxes -->
<line x1="127" y1="336" x2="127" y2="392" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="307" y1="336" x2="307" y2="392" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Arrows: Tron Path → index boxes -->
<line x1="670" y1="336" x2="670" y2="392" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="855" y1="336" x2="855" y2="392" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- EVM Index 0 -->
<rect x="20" y="394" width="215" height="95" rx="8" fill="#27AE60" filter="url(#sh)"/>
<text x="127" y="422" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="white">Index 0</text>
<text x="127" y="446" text-anchor="middle" dominant-baseline="middle" font-family="ui-monospace, monospace" font-size="11" fill="white" opacity="0.85">Ethereum &#xB7; Arbitrum</text>
<text x="127" y="464" text-anchor="middle" dominant-baseline="middle" font-family="ui-monospace, monospace" font-size="11" fill="white" opacity="0.85">Base &#xB7; BSC</text>

<!-- EVM Index 1…N -->
<rect x="245" y="394" width="125" height="95" rx="8" fill="#27AE60" filter="url(#sh)"/>
<text x="307" y="441" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Index 1 &#x2026; N</text>

<!-- Tron Index 0 -->
<rect x="560" y="394" width="220" height="95" rx="8" fill="#E67E22" filter="url(#sh)"/>
<text x="670" y="428" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="white">Index 0</text>
<text x="670" y="453" text-anchor="middle" dominant-baseline="middle" font-family="ui-monospace, monospace" font-size="11" fill="white" opacity="0.85">Tron (T&#x2026; address)</text>

<!-- Tron Index 1…N -->
<rect x="790" y="394" width="130" height="95" rx="8" fill="#E67E22" filter="url(#sh)"/>
<text x="855" y="441" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Index 1 &#x2026; N</text>

</svg>
